[build]
  command = "npm install && npm run build"
  publish = "."
  functions = "functions"

[functions]
  node_bundler = "nft"
  included_files = []

[[redirects]]
  from = "/api/youtube-upload"
  to = "/.netlify/functions/youtube-upload"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Expires = "0"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Expires = "0"
